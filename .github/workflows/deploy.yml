# NOTE: GitHub only runs this file from .github/workflows/deploy.yml.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install wrangler
        run: npm i -g wrangler

      - name: Create D1 database (no-op if it already exists)
        run: wrangler d1 create ninebirds-board || true

      - name: Wire the database id into wrangler.toml
        run: |
          DB_ID=$(wrangler d1 list --json | jq -r '.[] | select(.name=="ninebirds-board") | .uuid')
          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ]; then
            echo "Could not find the ninebirds-board D1 database" >&2
            exit 1
          fi
          sed -i "s/PLACEHOLDER_DB_ID/$DB_ID/" wrangler.toml
          echo "Using D1 database $DB_ID"

      - name: Apply schema (idempotent)
        run: wrangler d1 execute ninebirds-board --remote --file cloudflare/schema/0001_schema.sql

      - name: Apply seed data (idempotent)
        run: wrangler d1 execute ninebirds-board --remote --file cloudflare/schema/0002_seed.sql

      - name: Deploy Worker
        run: wrangler deploy | tee deploy.log

      - name: Push Slack webhook secret to the Worker
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        run: echo "$SLACK_WEBHOOK_URL" | wrangler secret put SLACK_WEBHOOK_URL

      - name: Print the board URL
        run: |
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy.log | head -1)
          echo "=============================================="
          echo "Board is live at: ${URL:-https://ninebirds-board.<your-subdomain>.workers.dev}"
          echo "=============================================="
